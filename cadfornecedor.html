<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedSync - Cadastro de Fabricante</title>
    <link rel="stylesheet" href="cadmed.css">
    <link rel="icon" href="med.png">
</head>

<body>
    <section>
        <div class="container-cadastro">
            <div class="cabecalho-form">
                <h2>Cadastro de Fabricante</h2>
                <p>Preencha os dados do novo fornecedor/fabricante no sistema.</p>
            </div>

            <form class="form-medicamento" action="#" method="POST">
                <div class="grupo-input">
                    <label for="id_fabricante">ID Fabricante</label>
                    <input type="text" id="id_fabricante" name="id_fabricante" placeholder="Gerado automaticamente" disabled>
                </div>

                <div class="grupo-input">
                    <label for="nome">Nome / Razão Social *</label>
                    <input type="text" id="nome" name="nome" placeholder="Ex: Laboratório Farmacêutico XYZ Ltda" required>
                </div>

                <div class="linha-dupla">
                    <div class="grupo-input destaque-codigo">
                        <label for="cnpj">CNPJ *</label>
                        <input type="text" id="cnpj" name="cnpj" placeholder="00.000.000/0001-00" required>
                    </div>
                
                    <div class="grupo-input">
                        <label for="telefone">Telefone *</label>
                        <input type="tel" id="telefone" name="telefone" placeholder="(11) 99999-9999" required>
                    </div>
                </div>

                <div class="grupo-input">
                    <label for="email">E-mail *</label>
                    <input type="email" id="email" name="email" placeholder="exemplo@fornecedor.com" required>
                </div>

                <div class="grupo-input">
                    <label for="endereco">Endereço Completo</label>
                    <input type="text" id="endereco" name="endereco" placeholder="Rua, Número, Bairro, Cidade - UF">
                </div>

                <div class="acoes-form">
                    <button type="reset" class="btn-cancelar">Limpar</button>
                    <button type="submit" class="btn-salvar">Salvar Fabricante</button>
                </div>
            </form>
        </div>
    </section>
</body>
</html>
