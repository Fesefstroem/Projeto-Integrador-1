<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedSync</title>
    <link rel="stylesheet" href="cadmed.css">
    <link rel="icon" href="med.png">
</head>

<body>
    <section>
    <div class="container-cadastro">
        <div class="cabecalho-form">
            <h2>Cadastro de Medicamento</h2>
            <p>Preencha os dados do novo medicamento no sistema.</p>
        </div>

        <form class="form-medicamento" action="#" method="POST">
        <!-- O ID do medicamento geralmente é gerado automaticamente pelo banco de dados -->
            <div class="grupo-input">
                <label for="id_medicamento">ID Medicamento</label>
                <input type="text" id="id_medicamento" name="id_medicamento" placeholder="Gerado automaticamente" disabled>
            </div>

            <div class="grupo-input">
                <label for="nome">Nome (Princípio ativo) *</label>
                <input type="text" id="nome" name="nome" placeholder="Ex: Paracetamol 500mg" required>
            </div>

            <div class="linha-dupla">
                <div class="grupo-input">
                    <label for="classificacao">Classificação</label>
                    <input type="text" id="classificacao" name="classificacao" placeholder="Ex: Analgésico">
                </div>
            
                <div class="grupo-input destaque-codigo">
                    <label for="codigo">Código *</label>
                    <input type="text" id="codigo" name="codigo" placeholder="Código de barras ou interno" required>
                </div>
            </div>

            <div class="linha-dupla">
                <div class="grupo-input">
                    <label for="uso">Via de uso</label>
                    <select id="uso" name="uso">
                        <option value="">Selecione...</option>
                        <option value="im">Intramuscular (IM)</option>
                        <option value="ev">Endovenoso (EV)</option>
                        <option value="vo">Via oral (VO)</option>
                    </select>
                </div>

                <div class="grupo-input">
                    <label for="apresentacao">Apresentação</label>
                    <select id="apres" name="apres">
                        <option value="">Selecione...</option>
                        <option value="a">Ampola</option>
                        <option value="f">Frasco</option>
                        <option value="c">Comprimido</option>
                        <option value="g">Gotas</option>
                    </select>
                </div>
            </div>

            <div class="linha-dupla">
                <div class="grupo-input">
                    <label for="id_fabricante">ID Fabricante *</label>
                    <input type="number" id="id_fabricante" name="id_fabricante" placeholder="Código do fornecedor" required>
                </div>

                <div class="grupo-input">
                    <label for="id_usuario">ID Usuário (quem cadastrou)</label>
                    <input type="text" id="id_usuario" name="id_usuario" value="Admin Logado" disabled>
                </div>
            </div>

            <div class="acoes-form">
                <button type="reset" class="btn-cancelar">Limpar</button>
                <button type="submit" class="btn-salvar">Salvar Medicamento</button>
            </div>
        </form>
    </div>
        </div>
</section>

</body>
</html>
