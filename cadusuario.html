<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedSync</title>
    <link rel="stylesheet" href="cadusuario.css">
    <link rel="icon" href="med.png">
</head>

<body>
    <section>
    <div class="container-cadastro">
    <div class="cabecalho-form">
        <h2>Cadastro de Usuário</h2>
        <p>Preencha os dados e defina as permissões do novo usuário no sistema.</p>
    </div>

    <form class="form-usuario" action="#" method="POST">
        <div class="grupo-input">
            <label for="id_usuario">ID Usuário</label>
            <input type="text" id="id_usuario" name="id_usuario" placeholder="Gerado automaticamente" disabled>
        </div>

        <div class="grupo-input">
            <label for="nome">Nome *</label>
            <input type="text" id="nome" name="nome" placeholder="Digite o nome completo" required>
        </div>

        <div class="linha-dupla">
            <div class="grupo-input">
                <label for="cpf">CPF *</label>
                <input type="text" id="cpf" name="cpf" placeholder="000.000.000-00" required>
            </div>
            
            <div class="grupo-input">
                <label for="email">Email *</label>
                <input type="email" id="email" name="email" placeholder="usuario@email.com" required>
            </div>
        </div>

        <div class="linha-dupla">
            <div class="grupo-input">
                <label for="senha">Senha *</label>
                <input type="password" id="senha" name="senha" placeholder="Crie uma senha forte" required>
            </div>

            <div class="grupo-input">
                <label for="perfil">Perfil *</label>
                <select id="perfil" name="perfil" required>
                    <option value="">Selecione...</option>
                    <option value="A">(A)dministrador</option>
                    <option value="G">(G)estor</option>
                    <option value="F">(F)armacêutico</option>
                    <option value="U">A(U)ditor</option>
                </select>
            </div>
        </div>

        <div class="acoes-form">
            <button type="reset" class="btn-cancelar">Limpar</button>
            <button type="submit" class="btn-salvar">Salvar Usuário</button>
        </div>
    </form>
    </div>
    </section>
</body>
</html>
